name: uhc
description: "University Health Center - Appointment Booking and Reminder System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  flutter_rating_bar: ^4.0.1
  
  # Firebase
  firebase_core: ^4.7.0         # was 3.15.2
  firebase_auth: ^6.4.0         # was 5.5.3
  cloud_firestore: ^6.3.0       # was 5.6.7 
  firebase_messaging: ^16.2.0   # was 15.2.10
  cloud_functions: ^6.2.0       # was 5.3.1
  
  # Authentication
  google_sign_in: ^7.2.0
  
  # State Management
  provider: ^6.1.4
  
  # Notifications
  flutter_local_notifications: ^21.0.0
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  
  # Calendar
  table_calendar: ^3.1.3
  
  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  
  # Charts for Admin
  fl_chart: ^1.2.0
  timezone: ^0.11.0
  firebase_storage: ^13.3.0
  file_picker: ^11.0.2
  package_info_plus: ^9.0.1
  firebase_crashlytics: ^5.2.0
  syncfusion_flutter_xlsio: ^33.2.4
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

flutter_launcher_icons:
  image_path: "assets/icons/Icon_app.png"
  android: true
  ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#00000000"
  adaptive_icon_foreground: "assets/icons/Icon_app.png"
  adaptive_icon_foreground_inset: 0
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icons/Icon_app.png"
    background_color: "#00000000"
    theme_color: "#00000000"
